# MODEL-W Small - RAW DATA (No Augmentation)
# OPTIMIZED FOR NVIDIA GH200 (96GB HBM3)

model:
  name: "model_s_raw"
  size: small             # ~85M Parameters
  d_model: 768
  n_layers: 12
  n_heads: 12
  max_seq_len: 8192
  vocab_size: 512
  dropout: 0.1
  gradient_checkpointing: false   # GH200 has enough memory
  use_flash_attention: true

data:
  data_dir: ./data/lakh_midi
  cache_dir: ./cache/raw
  max_seq_len: 8192
  min_seq_len: 128
  train_split: 0.95
  num_workers: 12                  # GH200 ARM cores handle more workers
  
  augmentation:
    pitch_augment: false
    pitch_range: [0, 0]
    tempo_augment: false
    tempo_range: [1.0, 1.0]

training:
  # === GH200 OPTIMIZED BATCHING ===
  batch_size: 64                   # 2x larger than A100
  gradient_accumulation_steps: 2
  # Effective batch: 128
  
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 800
  max_steps: 12000
  
  use_amp: true                    # bf16 native on GH200
  grad_clip: 1.0
  
  checkpoint_dir: ./checkpoints/model_s_raw
  save_every: 2000
  eval_every: 500
  log_every: 50

logging:
  wandb_project: model-w
  wandb_run_name: model_s_raw_gh200

# ============================================
# GH200 ESTIMATES
# ============================================
# ~1.5-2 hours for 12k steps
# 2x faster than A100 80GB
# ============================================

