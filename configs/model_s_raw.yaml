# MODEL-W Small - RAW DATA (No Augmentation)
# "model_s_raw" - Learn exact patterns from real data

model:
  name: "model_s_raw"
  size: small             # ~85M Parameters
  d_model: 768            # Standard (Efficient)
  n_layers: 12            # Shallow (Fast)
  n_heads: 12
  max_seq_len: 8192       # Full context
  vocab_size: 512
  dropout: 0.1
  gradient_checkpointing: true
  use_flash_attention: true

data:
  data_dir: ./data/lakh_midi
  cache_dir: ./cache/raw
  max_seq_len: 8192
  min_seq_len: 128
  train_split: 0.95
  num_workers: 8
  
  augmentation:
    pitch_augment: false
    pitch_range: [0, 0]       # DISABLED - Raw data only
    tempo_augment: false
    tempo_range: [1.0, 1.0]   # DISABLED - Raw data only

training:
  learning_rate: 3.0e-4       # Higher LR safe for smaller model
  weight_decay: 0.1
  warmup_steps: 1000
  max_steps: 12000            # Shorter run (raw data only)
  
  batch_size: 32
  gradient_accumulation_steps: 2
  # Effective batch: 64
  
  use_amp: true
  grad_clip: 1.0
  
  checkpoint_dir: ./checkpoints/model_s_raw
  save_every: 2000
  eval_every: 500
  log_every: 50

logging:
  wandb_project: model-w
  wandb_run_name: model_s_raw

# ============================================
# TRAINING ESTIMATES
# ============================================
# 1x A100 40GB: ~3-4 hours for 12k steps
# 1x A100 80GB: ~2-3 hours
# ============================================

